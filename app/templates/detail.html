{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-4 mb-4">
        {% if recipe.image_path %}
            <img src="{{ url_for('static', filename='uploads/' + recipe.image_path) }}" class="img-fluid rounded shadow-sm w-100" alt="{{ recipe.title }}">
        {% else %}
            <div class="bg-secondary rounded shadow-sm d-flex align-items-center justify-content-center text-white" style="height: 300px;">
                <div class="text-center">
                    <i class="bi bi-camera fs-1"></i>
                    <p class="mt-2">無照片</p>
                </div>
            </div>
        {% endif %}
        
        <div class="mt-4">
            <a href="{{ url_for('recipes.edit_recipe', id=recipe.id) }}" class="btn btn-outline-primary w-100 mb-2"><i class="bi bi-pencil"></i> 編輯食譜</a>
            
            <form action="{{ url_for('recipes.delete_recipe', id=recipe.id) }}" method="POST" onsubmit="return confirm('確定要刪除這份食譜嗎？此操作無法還原。');">
                <button type="submit" class="btn btn-outline-danger w-100"><i class="bi bi-trash"></i> 刪除食譜</button>
            </form>
        </div>
    </div>
    
    <div class="col-md-8">
        <h1 class="display-5 mb-3">{{ recipe.title }}</h1>
        <p class="text-muted">建立於 {{ recipe.created_at.strftime('%Y-%m-%d %H:%M') }}</p>
        
        {% if recipe.description %}
            <div class="alert alert-light border shadow-sm">
                {{ recipe.description }}
            </div>
        {% endif %}
        
        <h3 class="mt-4 border-bottom pb-2">烹調步驟</h3>
        <div class="mt-3 p-4 bg-white rounded shadow-sm" style="white-space: pre-wrap;">{{ recipe.steps }}</div>
    </div>
</div>
{% endblock %}
